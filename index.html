<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Спок Тренировки</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }
        .app-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        h1, h2 {
            text-align: center;
            color: #1e2a3a;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
            font-size: 16px;
            background: white;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button:hover:enabled {
            background: #45a049;
            transform: scale(1.02);
        }
        .gender-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .gender-btn {
            width: auto;
            padding: 12px 30px;
        }
        .back-btn {
            background: #ff9800;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .reset-profile-btn {
            background: #ff9800;
            width: auto;
        }
        .selector-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .selector-group select {
            flex: 1;
        }
        .selector-group span {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
        }
        .exercise-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .exercise-name {
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-btn {
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            margin-top: 0;
            line-height: 1;
        }
        .delete-exercise {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
            width: auto;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .input-group .field {
            flex: 1;
            min-width: 80px;
        }
        .field small {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
        .comment {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 14px;
            color: #2c3e50;
            border-left: 5px solid #4CAF50;
        }
        .add-exercise, .save-btn {
            width: 100%;
        }
        .progress {
            background: #f1f8e9;
            border-radius: 28px;
            padding: 20px;
            margin-top: 25px;
            border-left: 8px solid #4CAF50;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            text-align: center;
        }
        .modal-content img {
            max-width: 100%;
            border-radius: 20px;
        }
        .close-modal {
            background: #ff9800;
            width: auto;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .gender-btn { padding: 10px 20px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div id="genderScreen">
        <h2>👋 Привет! Выбери свой пол</h2>
        <div class="gender-buttons">
            <button class="gender-btn" data-gender="male">♂️ Мужчина</button>
            <button class="gender-btn" data-gender="female">♀️ Женщина</button>
        </div>
    </div>

    <div id="profileScreen" style="display: none;">
        <h2>📝 Расскажи о себе</h2>
        <div class="form-group">
            <label>Рост (см)</label>
            <input type="number" id="height" min="1" step="1" placeholder="например, 175">
        </div>
        <div class="form-group">
            <label>Вес (кг)</label>
            <input type="number" id="weight" min="1" step="1" placeholder="например, 80">
        </div>
        <div class="form-group">
            <label>Возраст</label>
            <input type="number" id="age" min="1" step="1" placeholder="например, 30">
        </div>
        <div class="form-group">
            <label>Уровень подготовки</label>
            <select id="level">
                <option value="beginner">Новичок (нужны подробные советы)</option>
                <option value="intermediate">Средний (понимаю основы)</option>
                <option value="advanced">Профи (минимум подсказок)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Цель тренировок</label>
            <select id="goal">
                <option value="strength">Увеличение силы</option>
                <option value="muscle_gain">Набор мышечной массы</option>
                <option value="weight_loss">Похудение / снижение веса</option>
                <option value="maintenance">Поддержание формы / здоровье</option>
            </select>
        </div>
        <button id="saveProfileBtn" disabled>Сохранить и продолжить</button>
        <button id="backToGenderBtn" class="back-btn">⬅ Назад (сменить пол)</button>
    </div>

    <div id="mainApp" style="display: none;">
        <div class="top-bar">
            <h1>🏋️ Спок Тренировки</h1>
            <button id="resetProfileBtn" class="reset-profile-btn">🔄 Сменить профиль</button>
        </div>
        <div class="selector-group">
            <select id="muscle1">
                <option value="chest">Грудь</option>
                <option value="back">Спина</option>
                <option value="legs">Ноги</option>
                <option value="shoulders">Плечи</option>
                <option value="biceps">Бицепс</option>
                <option value="triceps">Трицепс</option>
            </select>
            <span>+</span>
            <select id="muscle2">
                <option value="chest">Грудь</option>
                <option value="back">Спина</option>
                <option value="legs">Ноги</option>
                <option value="shoulders">Плечи</option>
                <option value="biceps">Бицепс</option>
                <option value="triceps">Трицепс</option>
            </select>
            <button id="applyBtn">Применить</button>
        </div>
        <div id="exercises-container"></div>
        <button class="add-exercise" id="addExerciseBtn">➕ Добавить упражнение</button>
        <button class="save-btn" id="saveBtn">💾 Сохранить тренировку</button>
        <div class="progress" id="progressContainer">
            <h3>📈 Прогресс</h3>
            <div id="progressText">Здесь будет анализ твоих результатов</div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <img id="modalImage" src="" alt="Техника упражнения">
        <button id="closeModalBtn" class="close-modal">Закрыть</button>
    </div>
</div>

<script>
    let currentGender = null;
    let userProfile = { height: 0, weight: 0, age: 0, level: 'intermediate', goal: 'maintenance' };
    let currentMuscle1 = 'chest';
    let currentMuscle2 = 'triceps';
    let exercises = [];

    const maleLibrary = {
        chest: ["Жим штанги лёжа", "Жим гантелей лёжа", "Разводка гантелей", "Отжимания на брусьях", "Жим в хаммере"],
        back: ["Тяга верхнего блока", "Тяга штанги в наклоне", "Горизонтальная тяга", "Подтягивания", "Тяга гантели одной рукой"],
        legs: ["Приседания со штангой", "Жим ногами", "Разгибание ног", "Сгибание ног", "Выпады с гантелями"],
        shoulders: ["Жим гантелей сидя", "Жим штанги стоя", "Махи в стороны", "Махи в наклоне", "Шраги"],
        biceps: ["Подъём штанги на бицепс", "Молоточки", "Концентрированный подъём", "Подъём на скамье Скотта", "Обратный хват"],
        triceps: ["Разгибание на блоке", "Кикбэк", "Французский жим", "Отжимания на брусьях (узко)", "Жим лёжа узким хватом"]
    };
    const femaleLibrary = {
        chest: ["Жим гантелей лёжа (лёгкий)", "Сведение рук в кроссовере", "Отжимания от пола с колен", "Жим от груди сидя", "Пуловер с гантелью"],
        back: ["Тяга верхнего блока", "Горизонтальная тяга", "Тяга гантели к поясу", "Гиперэкстензия", "Подтягивания с поддержкой"],
        legs: ["Приседания с гантелями", "Ягодичный мостик", "Разгибание ног", "Сгибание ног", "Выпады назад"],
        shoulders: ["Жим гантелей сидя (лёгкий)", "Махи в стороны", "Махи перед собой", "Махи в наклоне", "Шраги с гантелями"],
        biceps: ["Подъём гантелей на бицепс", "Молоточки", "Концентрированный подъём", "Подъём на скамье Скотта (лёгкий)", "Обратный хват с резиной"],
        triceps: ["Разгибание на блоке", "Кикбэк с гантелью", "Французский жим лёжа (лёгкий)", "Отжимания от скамьи", "Жим лёжа узким хватом (лёгкий)"]
    };

    function getExerciseImageUrl(exerciseName) {
        return `https://via.placeholder.com/400x300?text=${encodeURIComponent(exerciseName)}`;
    }

    function getLibrary() { return currentGender === 'male' ? maleLibrary : femaleLibrary; }

    function generateExercises() {
        const lib = getLibrary();
        let newExercises = [];
        let ex1 = lib[currentMuscle1].slice(0, 3);
        let ex2 = lib[currentMuscle2].slice(0, 3);
        for (let name of ex1) newExercises.push({ name, sets: 0, weight: 0, reps: 0 });
        for (let name of ex2) newExercises.push({ name, sets: 0, weight: 0, reps: 0 });
        return newExercises;
    }

    function computeSafeMaxWeightWithReps(baseMax, reps, goal) {
        let factor = 1.0;
        if (goal === 'strength') {
            if (reps >= 1 && reps <= 6) factor = 1.2;
            else if (reps >= 7 && reps <= 10) factor = 1.0;
            else if (reps >= 11) factor = 0.8;
        } else if (goal === 'muscle_gain') {
            if (reps >= 1 && reps <= 6) factor = 1.1;
            else if (reps >= 7 && reps <= 10) factor = 1.0;
            else if (reps >= 11) factor = 0.9;
        } else if (goal === 'weight_loss') {
            if (reps >= 1 && reps <= 6) factor = 0.9;
            else if (reps >= 7 && reps <= 10) factor = 1.0;
            else if (reps >= 11) factor = 1.1;
        } else {
            if (reps >= 1 && reps <= 6) factor = 1.1;
            else if (reps >= 7 && reps <= 10) factor = 1.0;
            else if (reps >= 11) factor = 0.9;
        }
        return Math.round(baseMax * factor);
    }

    function computeBaseSafeMax(weightKg, heightCm, age, level, gender) {
        let bmi = weightKg / ((heightCm/100) ** 2);
        let base = 50;
        if (gender === 'female') base = 35;
        if (age > 50) base *= 0.8;
        if (age > 60) base *= 0.7;
        if (bmi < 18.5) base *= 0.7;
        else if (bmi > 30) base *= 0.4;
        else if (bmi > 35) base *= 0.2;
        else if (bmi > 40) base = 15;
        if (level === 'beginner') base *= 0.7;
        else if (level === 'advanced') base *= 1.2;
        return Math.min(Math.max(Math.round(base), 10), 250);
    }

    function getPersonalizedAdvice(weight, reps, sets, exerciseName) {
        const level = userProfile.level;
        const goal = userProfile.goal;
        const isAdvanced = (level === 'advanced');
        const isIntermediate = (level === 'intermediate');
        const isBeginner = (level === 'beginner');
        const maxWeight = currentGender === 'male' ? 300 : 150;
        const isBodyweight = exerciseName.toLowerCase().includes('отжимания') || exerciseName.toLowerCase().includes('брусья') || exerciseName.toLowerCase().includes('подтягивания');
        
        if (!isBodyweight && weight === 0 && reps > 0) return 'Вес не указан.';
        if (weight > 0 && reps === 0) return 'Повторения не указаны.';
        if (sets === 0) return 'Укажи количество подходов.';
        if (sets > 6) return '⚠️ Слишком много подходов (более 6). Обычно достаточно 3–4.';
        if (reps > 30) return '⚠️ Слишком много повторений (более 30).';
        if (weight < 0 || reps < 0 || sets < 0) return '⚠️ Значения не могут быть отрицательными.';
        if (weight > maxWeight) return `⚠️ Нереалистичный вес (более ${maxWeight} кг).`;

        let baseSafe = computeBaseSafeMax(userProfile.weight, userProfile.height, userProfile.age, level, currentGender);
        let safeMax = computeSafeMaxWeightWithReps(baseSafe, reps, goal);
        
        let safetyMsg = '';
        let isOverweight = (weight > safeMax);
        if (isOverweight) {
            if (isBeginner) {
                return `⚠️ Ваш вес (${weight} кг) превышает рекомендуемый предел для новичка (${safeMax} кг). Снизьте вес до ${safeMax} кг.`;
            } else if (isIntermediate) {
                safetyMsg = ` ⚠️ Вес высокий (${weight} кг) для вашего уровня. Будьте осторожны, используйте пояс и страховку. Увеличивать вес пока не рекомендуется.`;
            } else if (isAdvanced) {
                safetyMsg = ` ⚠️ Вы работаете с большим весом (${weight} кг). Следите за техникой, используйте пояс и страховку. Если чувствуете силы, можно осторожно добавить вес.`;
            }
        }
        
        let advice = '';
        let increaseText = '';
        if (goal === 'strength') increaseText = 'увеличь вес на 5–10 кг, работай в диапазоне 4–6 повторений';
        else if (goal === 'muscle_gain') increaseText = 'увеличь вес на 2–5 кг (для набора массы)';
        else if (goal === 'weight_loss') increaseText = 'осторожно, цель — похудение, лучше фокус на повторения (12-15) и диету';
        else increaseText = 'увеличь вес на 2.5–5 кг (для поддержания формы)';
        if (isBeginner) increaseText += ', но не торопись с весом';
        
        if (isOverweight && !isAdvanced) increaseText = '';
        else if (isOverweight && isAdvanced) increaseText = ' Если чувствуешь силы, можешь осторожно добавить 2.5–5 кг.';
        
        if (reps < 4) advice = isBeginner ? 'Начни с меньшего веса, цель — 6-8 повторений.' : 'Очень мало повторений. Снизь вес для 6-8 повторов.';
        else if (reps >= 4 && reps <= 6) advice = isBeginner ? `Хороший силовой диапазон, но новичкам лучше 8-10 повторений. ${increaseText}.` :
                                       (isAdvanced ? `Отличный силовой диапазон. ${increaseText}.` : `Силовой диапазон. ${increaseText}.`);
        else if (reps >= 7 && reps <= 10) advice = `Рабочий диапазон (7–10 повторений). Если легко, ${increaseText}.`;
        else if (reps >= 11 && reps <= 15) advice = isBeginner ? 'Хорошая выносливость, можно немного увеличить вес.' : 'Высокая выносливость. Увеличь вес на 5-10 кг.';
        else advice = 'Слишком много повторений, добавь вес.';
        
        if (isBeginner && advice !== 'Нормально, продолжай.') advice += ' Помни о технике!';
        if (goal === 'weight_loss' && reps < 10) advice += ' Для похудения рекомендовано 10-15 повторений.';
        if (goal === 'strength' && reps > 8 && !isOverweight) advice += ' Для силы лучше 4-6 повторений с бóльшим весом.';
        
        advice += safetyMsg;
        return advice;
    }

    function validateProfile() {
        const height = parseInt(document.getElementById('height').value);
        const weight = parseInt(document.getElementById('weight').value);
        const age = parseInt(document.getElementById('age').value);
        const valid = height > 0 && weight > 0 && age > 0;
        document.getElementById('saveProfileBtn').disabled = !valid;
    }

    function render() {
        const container = document.getElementById('exercises-container');
        container.innerHTML = '';
        for (let i = 0; i < exercises.length; i++) {
            const ex = exercises[i];
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.innerHTML = `
                <div class="exercise-header">
                    <span class="exercise-name">
                        ${ex.name}
                        <button class="info-btn" data-exercise="${ex.name}">ℹ️</button>
                    </span>
                    <button class="delete-exercise" data-index="${i}">🗑️ Удалить</button>
                </div>
                <div class="input-group">
                    <div class="field">
                        <input type="number" min="0" max="6" step="1" placeholder="Подходы" data-type="sets" data-index="${i}" value="${ex.sets}">
                        <small>подходы (макс.6)</small>
                    </div>
                    <div class="field">
                        <input type="number" min="0" step="0.5" placeholder="Вес (кг)" data-type="weight" data-index="${i}" value="${ex.weight}">
                        <small>вес, кг</small>
                    </div>
                    <div class="field">
                        <input type="number" min="0" step="1" placeholder="Повторения" data-type="reps" data-index="${i}" value="${ex.reps}">
                        <small>повторения</small>
                    </div>
                </div>
                <div class="comment" id="comment-${i}">Совет появится после ввода</div>
            `;
            container.appendChild(card);
        }
        document.querySelectorAll('.delete-exercise').forEach(btn => {
            btn.addEventListener('click', (e) => {
                exercises.splice(parseInt(btn.dataset.index), 1);
                render();
            });
        });
        document.querySelectorAll('.info-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const exerciseName = btn.dataset.exercise;
                const imgUrl = getExerciseImageUrl(exerciseName);
                const modal = document.getElementById('modal');
                const modalImg = document.getElementById('modalImage');
                modalImg.src = imgUrl;
                modal.style.display = 'flex';
            });
        });
        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('change', (e) => {
                const index = parseInt(input.dataset.index);
                const type = input.dataset.type;
                let val = parseFloat(input.value);
                if (isNaN(val)) val = 0;
                if (val < 0) val = 0;
                if (type === 'sets' && val > 6) val = 6;
                if (type === 'sets') exercises[index].sets = val;
                else if (type === 'weight') exercises[index].weight = val;
                else if (type === 'reps') exercises[index].reps = val;
                const ex = exercises[index];
                const advice = getPersonalizedAdvice(ex.weight, ex.reps, ex.sets, ex.name);
                document.getElementById(`comment-${index}`).innerText = advice;
            });
        });
    }

    function applySelection() {
        currentMuscle1 = document.getElementById('muscle1').value;
        currentMuscle2 = document.getElementById('muscle2').value;
        exercises = generateExercises();
        render();
        updateProgress();
    }

    function updateProgress() {
        const progressDiv = document.getElementById('progressText');
        let totalVolume = 0;
        let report = `📊 Отчёт о тренировке (${new Date().toLocaleString()}):\n`;
        for (let ex of exercises) {
            let volume = ex.sets * ex.weight * ex.reps;
            totalVolume += volume;
            if (ex.sets > 0 && ex.weight > 0 && ex.reps > 0) {
                report += `\n${ex.name}: ${ex.sets}×${ex.weight}×${ex.reps} = ${volume} кг`;
            } else {
                report += `\n${ex.name}: данные не заполнены`;
            }
        }
        report += `\n\n💰 Итого: ${totalVolume} кг`;
        if (totalVolume === 0) {
            progressDiv.innerText = 'Нет данных. Введи параметры упражнений.';
        } else {
            progressDiv.innerText = report;
        }
    }

    function saveData() {
        localStorage.setItem('trainingsDataFlex', JSON.stringify({ muscle1: currentMuscle1, muscle2: currentMuscle2, exercises }));
        updateProgress();
        alert('Тренировка сохранена!');
    }

    function resetProfile() {
        localStorage.clear();
        window.location.reload();
    }

    function loadProfileAndApp() {
        currentGender = localStorage.getItem('gender');
        const savedProfile = localStorage.getItem('userProfile');
        
        if (!currentGender || !savedProfile) {
            document.getElementById('genderScreen').style.display = 'block';
            document.getElementById('profileScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'none';
            return;
        }
        
        userProfile = JSON.parse(savedProfile);
        document.getElementById('genderScreen').style.display = 'none';
        document.getElementById('profileScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        const saved = localStorage.getItem('trainingsDataFlex');
        if (saved) {
            const data = JSON.parse(saved);
            exercises = data.exercises;
            currentMuscle1 = data.muscle1;
            currentMuscle2 = data.muscle2;
            document.getElementById('muscle1').value = currentMuscle1;
            document.getElementById('muscle2').value = currentMuscle2;
        } else {
            exercises = generateExercises();
        }
        render();
        updateProgress();
    }

    document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentGender = btn.dataset.gender;
            localStorage.setItem('gender', currentGender);
            document.getElementById('genderScreen').style.display = 'none';
            document.getElementById('profileScreen').style.display = 'block';
        });
    });

    document.getElementById('saveProfileBtn').addEventListener('click', () => {
        let height = parseInt(document.getElementById('height').value);
        let weight = parseInt(document.getElementById('weight').value);
        let age = parseInt(document.getElementById('age').value);
        let level = document.getElementById('level').value;
        let goal = document.getElementById('goal').value;
        if (height > 0 && weight > 0 && age > 0) {
            userProfile = { height, weight, age, level, goal };
            localStorage.setItem('userProfile', JSON.stringify(userProfile));
            document.getElementById('profileScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            exercises = generateExercises();
            render();
            updateProgress();
        }
    });

    document.getElementById('backToGenderBtn').addEventListener('click', () => {
        localStorage.removeItem('gender');
        window.location.reload();
    });
    document.getElementById('applyBtn').addEventListener('click', applySelection);
    document.getElementById('saveBtn').addEventListener('click', saveData);
    document.getElementById('resetProfileBtn').addEventListener('click', resetProfile);
    document.getElementById('addExerciseBtn').addEventListener('click', () => {
        const newName = prompt('Название упражнения:');
        if (newName) exercises.push({ name: newName, sets: 0, weight: 0, reps: 0 });
        render();
    });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('modal').style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('modal');
        if (e.target === modal) modal.style.display = 'none';
    });

    ['height', 'weight', 'age'].forEach(id => {
        const input = document.getElementById(id);
        input.addEventListener('input', validateProfile);
        input.addEventListener('input', () => { if (input.value < 0) input.value = 0; });
    });

    loadProfileAndApp();
</script>
</body>
</html>
